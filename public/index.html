    <!--
      Icon fonts — load all @expo/vector-icons fonts from jsDelivr CDN.

      Root cause of missing icons: Vercel serves public/ directly (no build step),
      so the hashed asset paths like
        /assets/__node_modules/.pnpm/@expo+vector-icons@15.1.1_.../Fonts/MaterialIcons.xxx.ttf
      do not exist in the public/ directory. The @ and + characters in pnpm
      asset paths also cause URL-encoding issues with some CDN/proxy layers.

      Fix: declare every icon font-family via @font-face here, in <head>,
      BEFORE the app JS executes. The font-family names match EXACTLY what
      @expo/vector-icons registers at runtime. font-display:block prevents
      the brief "square box" flash while fonts load.
    -->

      @font-face { font-family: 'MaterialIcons'; font-style: normal; font-weight: 400; font-display: block; src: url(https://cdn.jsdelivr.net/npm/@expo/vector-icons@15.1.1/build/vendor/react-native-vector-icons/Fonts/MaterialIcons.ttf) format('truetype'); }
      @font-face { font-family: 'MaterialCommunityIcons'; font-style: normal; font-weight: 400; font-display: block; src: url(https://cdn.jsdelivr.net/npm/@expo/vector-icons@15.1.1/build/vendor/react-native-vector-icons/Fonts/MaterialCommunityIcons.ttf) format('truetype'); }
