kind = "mobile"
previewPath = "/"
title = "MAWIBO"
version = "1.0.0"
id = "artifacts/ehealthmate"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 18699

[services.development]
run = "pnpm --filter @workspace/ehealthmate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ehealthmate", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ehealthmate", "run", "serve" ]

[services.env]
PORT = "18699"
BASE_PATH = "/"
